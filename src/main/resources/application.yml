server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: 127.0.0.1
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 30000

# Spring AI Alibaba DashScope 配置
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/superbiz_agent?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:superbiz}
    password: ${SPRING_DATASOURCE_PASSWORD:superbiz1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 从环境变量读取
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒
    
    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容
    mcp:
      client:
        enabled: false
        name: tencent-mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            tencent-cls:
              url: https://mcp-api.tencent-cloud.com
              sse-endpoint: /sse/104de438881a6e9a  # 完整的SSE端点路径
# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}  # 从环境变量读取（用于自定义配置）
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称

memory:
  base-path: ./memory
  max-index-lines: 200
  short-memory-pairs: 6
  short-compression:
    enabled: true
    threshold: 12
    keep-recent: 6
    max-records: 30
  long-extraction:
    enabled: true
    success-threshold: 5
    before-compression: true

skills:
  base-path: ./skills

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
#  timeout: 10  # 超时时间（秒）
  mock-enabled: true  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: true  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

# MySQL 工具配置
mysql:
  tool:
    enabled: false
    url: ${MYSQL_TOOL_URL:jdbc:mysql://localhost:3306/superbiz_agent?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${MYSQL_TOOL_USERNAME:superbiz}
    password: ${MYSQL_TOOL_PASSWORD:superbiz1234}
    query-timeout-seconds: 10

# 外网查询工具配置
web:
  tool:
    enabled: true
    timeout-seconds: 10
    max-response-chars: 12000

# 公共搜索工具配置
search:
  tool:
    timeout-seconds: 10
    max-results: 5

# 天气/地图工具配置
weather-map:
  tool:
    timeout-seconds: 10
    max-map-results: 5

# Agent 安全限制
agent:
  safety:
    model-call-limit: 6
    tool-call-limit: 12

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
